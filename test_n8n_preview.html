<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ShopMaiBeli Workflow Preview</title>
  <script src="https://cdn.jsdelivr.net/npm/@webcomponents/webcomponentsjs@2.0.0/webcomponents-loader.js"></script>
  <script src="https://www.unpkg.com/lit@2.0.0-rc.2/polyfill-support.js"></script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@n8n_io/n8n-demo-component/n8n-demo.bundled.js"></script>
  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, sans-serif; background: #f5f5f5; }
    .wrap { height: 100%; padding: 12px; box-sizing: border-box; display: flex; flex-direction: column; gap: 8px; }
    .title { font-size: 14px; font-weight: 600; color: #333; }
    .panel { flex: 1; border: 1px solid #ddd; border-radius: 8px; background: #fff; overflow: hidden; }
    n8n-demo { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">⚡ ShopMaiBeli — Shopping Search with Review Analysis</div>
    <div class="panel">
      <n8n-demo workflow='{
        "nodes": [
          {
            "name": "Chat Trigger",
            "type": "@n8n/n8n-nodes-langchain.chatTrigger",
            "typeVersion": 1,
            "position": [0, 200],
            "parameters": {}
          },
          {
            "name": "Query Analyzer",
            "type": "@n8n/n8n-nodes-langchain.agent",
            "typeVersion": 1,
            "position": [240, 200],
            "parameters": { "systemMessage": "Extract product category and search query from the user input." }
          },
          {
            "name": "DeepSeek LLM",
            "type": "@n8n/n8n-nodes-langchain.lmChatOpenAi",
            "typeVersion": 1,
            "position": [240, 420],
            "parameters": { "model": "deepseek-chat" }
          },
          {
            "name": "Memory",
            "type": "@n8n/n8n-nodes-langchain.memoryBufferWindow",
            "typeVersion": 1,
            "position": [80, 420],
            "parameters": {}
          },
          {
            "name": "Product Search",
            "type": "n8n-nodes-base.httpRequest",
            "typeVersion": 4,
            "position": [500, 200],
            "parameters": { "url": "https://dummyjson.com/products/search", "method": "GET" }
          },
          {
            "name": "Review Analyzer",
            "type": "@n8n/n8n-nodes-langchain.agent",
            "typeVersion": 1,
            "position": [740, 200],
            "parameters": { "systemMessage": "Analyze product reviews using RAG retrieval from local review corpus." }
          },
          {
            "name": "DeepSeek LLM (Reviews)",
            "type": "@n8n/n8n-nodes-langchain.lmChatOpenAi",
            "typeVersion": 1,
            "position": [740, 420],
            "parameters": { "model": "deepseek-chat" }
          },
          {
            "name": "Report Generator",
            "type": "@n8n/n8n-nodes-langchain.agent",
            "typeVersion": 1,
            "position": [980, 200],
            "parameters": { "systemMessage": "Generate a ranked Markdown comparison report of the products." }
          },
          {
            "name": "DeepSeek LLM (Report)",
            "type": "@n8n/n8n-nodes-langchain.lmChatOpenAi",
            "typeVersion": 1,
            "position": [980, 420],
            "parameters": { "model": "deepseek-chat" }
          },
          {
            "name": "Output Parser",
            "type": "@n8n/n8n-nodes-langchain.outputParserStructured",
            "typeVersion": 1,
            "position": [1120, 420],
            "parameters": {}
          },
          {
            "name": "Convert to File",
            "type": "n8n-nodes-base.convertToFile",
            "typeVersion": 1,
            "position": [1220, 200],
            "parameters": { "operation": "toText", "fileName": "report.md" }
          }
        ],
        "connections": {
          "Chat Trigger": {
            "main": [[{ "node": "Query Analyzer", "type": "main", "index": 0 }]]
          },
          "Query Analyzer": {
            "main": [[{ "node": "Product Search", "type": "main", "index": 0 }]]
          },
          "DeepSeek LLM": {
            "ai_languageModel": [[{ "node": "Query Analyzer", "type": "ai_languageModel", "index": 0 }]]
          },
          "Memory": {
            "ai_memory": [[{ "node": "Query Analyzer", "type": "ai_memory", "index": 0 }]]
          },
          "Product Search": {
            "main": [[{ "node": "Review Analyzer", "type": "main", "index": 0 }]]
          },
          "Review Analyzer": {
            "main": [[{ "node": "Report Generator", "type": "main", "index": 0 }]]
          },
          "DeepSeek LLM (Reviews)": {
            "ai_languageModel": [[{ "node": "Review Analyzer", "type": "ai_languageModel", "index": 0 }]]
          },
          "Report Generator": {
            "main": [[{ "node": "Convert to File", "type": "main", "index": 0 }]]
          },
          "DeepSeek LLM (Report)": {
            "ai_languageModel": [[{ "node": "Report Generator", "type": "ai_languageModel", "index": 0 }]]
          },
          "Output Parser": {
            "ai_outputParser": [[{ "node": "Report Generator", "type": "ai_outputParser", "index": 0 }]]
          }
        }
      }'></n8n-demo>
    </div>
  </div>
</body>
</html>
